# Builds the LLM gateway image and publishes it to GitHub Container Registry.
# The Dockerfile expects the monorepo layout (Rag-llm-gateway/ and
# Rag-proto-contract/ as siblings), so we reconstruct that layout in CI.
name: Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout llm-gateway
        uses: actions/checkout@v6
        with:
          path: Rag-llm-gateway

      - name: Checkout proto contract
        uses: actions/checkout@v6
        with:
          repository: emanueleledda/Rag-proto-contract
          ref: v1.1
          path: Rag-proto-contract
          token: ${{ secrets.SHARED_REPOS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Rag-llm-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
